services:
  plausible_db:
    image: postgres:16-alpine
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - dokploy-network
    volumes:
      - db-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_PASSWORD=postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 40s

  plausible_events_db:
    image: clickhouse/clickhouse-server:24.12-alpine
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - dokploy-network
    volumes:
      - event-data:/var/lib/clickhouse
      # - /opt/dokploy-extra/showroom-plausible-ynwkqr/clickhouse-config.d/04-clear-listen-host.xml:/etc/clickhouse-server/config.d/04-clear-listen-host.xml:ro
      # - /opt/dokploy-extra/showroom-plausible-ynwkqr/clickhouse-config.d/05-listen.xml:/etc/clickhouse-server/config.d/05-listen.xml:ro
      # - /opt/dokploy-extra/showroom-plausible-ynwkqr/clickhouse-config.d/10-calm-logging.xml:/etc/clickhouse-server/config.d/10-calm-logging.xml:ro
      # - /opt/dokploy-extra/showroom-plausible-ynwkqr/clickhouse-users.d/10-disable-query-logging.xml:/etc/clickhouse-server/users.d/10-disable-query-logging.xml:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    environment:
      - CLICKHOUSE_SKIP_USER_SETUP=1
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 -O - http://127.0.0.1:8123/ping || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 40
      start_period: 50s

  plausible:
    image: ghcr.io/plausible/community-edition:v3.2.0
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - dokploy-network
    # volumes:
      # - /opt/dokploy-extra/showroom-plausible-ynwkqr/log_config.exs:/app/log_config.exs:ro
    depends_on:
      plausible_db:
        condition: service_healthy
      plausible_events_db:
        condition: service_healthy
    env_file:
      - .env
    command: >
      sh -c "
        /entrypoint.sh db createdb &&
        /entrypoint.sh db migrate &&
        /entrypoint.sh run
      "

  plausible_x:
    # Dokploy clones this repository before running `docker compose up --build`,
    # so build the provisioner from source instead of relying on a cached `latest` image.
    build:
      context: ./plausible-x
    image: ghcr.io/fantasynexus/plausible-x:latest
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - dokploy-network
    depends_on:
      plausible_db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgres://postgres:postgres@plausible_db:5432/plausible_db?sslmode=disable
      - PORT=8080

volumes:
  db-data:
  event-data:

networks:
  dokploy-network:
    external: true
